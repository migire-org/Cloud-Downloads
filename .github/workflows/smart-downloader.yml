name: 'Cloud Leecher Engine'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      file_url:
        required: true
        type: string

      folder_name:
        required: true
        type: string

      safe_mode:
        required: true
        type: string

      cookies_b64:
        required: true
        type: string

permissions:
  contents: write

jobs:
  leech:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Prepare cookies file
        shell: bash
        run: |
          printf "%s" "${{ github.event.inputs.cookies_b64 }}" | base64 --decode > cookies.txt
          if [ ! -s "cookies.txt" ]; then
            echo "cookies.txt is empty after decoding."
            exit 1
          fi

      - name: Process File
        shell: bash
        run: |
          set -e

          URL="${{ github.event.inputs.file_url }}"
          FOLDER="${{ github.event.inputs.folder_name }}"
          SAFE_MODE="${{ github.event.inputs.safe_mode }}"

          download_direct() {
            echo "Detected direct file URL"

            RAW_NAME=$(basename "${URL%%\?*}" | sed 's/%20/ /g')
            NAME_NO_EXT="${RAW_NAME%.*}"
            URL_EXT="${RAW_NAME##*.}"

            if [ "$URL_EXT" = "$RAW_NAME" ]; then
              URL_EXT=""
            fi

            curl -k -L --fail --retry 5 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              --progress-bar \
              -D headers.txt \
              -o "temp_download" \
              "$URL"

            CONTENT_TYPE=$(grep -i "^content-type:" headers.txt | tail -n 1 | cut -d":" -f2- | tr -d "\r" | xargs)
            MIME_TYPE=$(file --mime-type -b temp_download)

            SELECTED_EXT="$URL_EXT"

            if [ -z "$SELECTED_EXT" ] || [ ${#SELECTED_EXT} -gt 5 ]; then
              case "$CONTENT_TYPE|$MIME_TYPE" in
                *application/zip*|*application/x-zip*|*application/x-zip-compressed*)
                  SELECTED_EXT="zip"
                  ;;
                *application/x-zip*)
                  SELECTED_EXT="zip"
                  ;;
                *application/x-apple-ios-ipa*|*application/vnd.iphone*)
                  SELECTED_EXT="ipa"
                  ;;
                *application/x-ipsw*|*application/vnd.apple.ipsw*|*application/octet-stream*ipsw*)
                  SELECTED_EXT="ipsw"
                  ;;
                *application/vnd.android.package-archive*)
                  SELECTED_EXT="apk"
                  ;;
                *application/x-apk*)
                  SELECTED_EXT="apk"
                  ;;
                *application/vnd.android.bundle*)
                  SELECTED_EXT="aab"
                  ;;
                *application/xapk*)
                  SELECTED_EXT="xapk"
                  ;;
                *application/apks*)
                  SELECTED_EXT="apks"
                  ;;
                *application/apkm*)
                  SELECTED_EXT="apkm"
                  ;;
                *application/vnd.android.obb*)
                  SELECTED_EXT="obb"
                  ;;
                *application/octet-stream*android*)
                  SELECTED_EXT="apk"
                  ;;
                *application/octet-stream*xapk*)
                  SELECTED_EXT="xapk"
                  ;;
                *application/octet-stream*apkm*)
                  SELECTED_EXT="apkm"
                  ;;
                *application/octet-stream*aab*)
                  SELECTED_EXT="aab"
                  ;;
                *application/vnd.android.apex*)
                  SELECTED_EXT="apex"
                  ;;
                *application/vnd.android.artifact*)
                  SELECTED_EXT="aar"
                  ;;
                *application/x-aar*)
                  SELECTED_EXT="aar"
                  ;;
                *application/x-xz*)
                  SELECTED_EXT="xz"
                  ;;
                *application/zstd*|*application/x-zstd*)
                  SELECTED_EXT="zst"
                  ;;
                *application/x-bzip2*)
                  SELECTED_EXT="bz2"
                  ;;
                *application/x-lzip*)
                  SELECTED_EXT="lz"
                  ;;
                *application/x-lzma*)
                  SELECTED_EXT="lzma"
                  ;;
                *application/x-lz4*)
                  SELECTED_EXT="lz4"
                  ;;
                *application/x-brotli*)
                  SELECTED_EXT="br"
                  ;;
                *application/x-tar*)
                  SELECTED_EXT="tar"
                  ;;
                *application/x-gtar*)
                  SELECTED_EXT="tar"
                  ;;
                *application/gzip*)
                  SELECTED_EXT="gz"
                  ;;
                *application/x-compress*)
                  SELECTED_EXT="z"
                  ;;
                *application/x-cpio*)
                  SELECTED_EXT="cpio"
                  ;;
                *application/x-arj*)
                  SELECTED_EXT="arj"
                  ;;
                *application/x-cab*|*application/vnd.ms-cab-compressed*)
                  SELECTED_EXT="cab"
                  ;;
                *application/x-iso9660-image*)
                  SELECTED_EXT="iso"
                  ;;
                *application/x-apple-diskimage*)
                  SELECTED_EXT="dmg"
                  ;;
                *application/x-xar*)
                  SELECTED_EXT="xar"
                  ;;
                *application/x-udf*)
                  SELECTED_EXT="udf"
                  ;;
                *application/x-virtualbox-vdi*)
                  SELECTED_EXT="vdi"
                  ;;
                *application/x-vmdk*)
                  SELECTED_EXT="vmdk"
                  ;;
                *application/x-archive*)
                  SELECTED_EXT="a"
                  ;;
                *application/pdf*)
                  SELECTED_EXT="pdf"
                  ;;
                *application/rtf*|*text/rtf*)
                  SELECTED_EXT="rtf"
                  ;;
                *text/plain*)
                  SELECTED_EXT="txt"
                  ;;
                *text/markdown*)
                  SELECTED_EXT="md"
                  ;;
                *text/x-log*)
                  SELECTED_EXT="log"
                  ;;
                *text/csv*)
                  SELECTED_EXT="csv"
                  ;;
                *application/json*)
                  SELECTED_EXT="json"
                  ;;
                *application/ld+json*)
                  SELECTED_EXT="jsonld"
                  ;;
                *application/yaml*|*text/yaml*|*text/x-yaml*)
                  SELECTED_EXT="yaml"
                  ;;
                *application/toml*|*text/x-toml*)
                  SELECTED_EXT="toml"
                  ;;
                *application/xml*|*text/xml*)
                  SELECTED_EXT="xml"
                  ;;
                *text/html*)
                  SELECTED_EXT="html"
                  ;;
                *text/css*)
                  SELECTED_EXT="css"
                  ;;
                *text/javascript*|*application/javascript*)
                  SELECTED_EXT="js"
                  ;;
                *application/typescript*|*text/typescript*)
                  SELECTED_EXT="ts"
                  ;;
                *application/vnd.openxmlformats-officedocument.wordprocessingml.document*)
                  SELECTED_EXT="docx"
                  ;;
                *application/msword*)
                  SELECTED_EXT="doc"
                  ;;
                *application/vnd.oasis.opendocument.text*)
                  SELECTED_EXT="odt"
                  ;;
                *application/vnd.openxmlformats-officedocument.spreadsheetml.sheet*)
                  SELECTED_EXT="xlsx"
                  ;;
                *application/vnd.ms-excel*)
                  SELECTED_EXT="xls"
                  ;;
                *application/vnd.oasis.opendocument.spreadsheet*)
                  SELECTED_EXT="ods"
                  ;;
                *application/vnd.openxmlformats-officedocument.presentationml.presentation*)
                  SELECTED_EXT="pptx"
                  ;;
                *application/vnd.ms-powerpoint*)
                  SELECTED_EXT="ppt"
                  ;;
                *application/vnd.oasis.opendocument.presentation*)
                  SELECTED_EXT="odp"
                  ;;
                *application/epub+zip*)
                  SELECTED_EXT="epub"
                  ;;
                *application/x-mobipocket-ebook*)
                  SELECTED_EXT="mobi"
                  ;;
                *video/mp4*)
                  SELECTED_EXT="mp4"
                  ;;
                *video/mpeg*)
                  SELECTED_EXT="mpeg"
                  ;;
                *video/x-matroska*)
                  SELECTED_EXT="mkv"
                  ;;
                *video/x-msvideo*)
                  SELECTED_EXT="avi"
                  ;;
                *video/webm*)
                  SELECTED_EXT="webm"
                  ;;
                *video/quicktime*)
                  SELECTED_EXT="mov"
                  ;;
                *video/x-ms-wmv*)
                  SELECTED_EXT="wmv"
                  ;;
                *video/x-flv*)
                  SELECTED_EXT="flv"
                  ;;
                *video/3gpp*)
                  SELECTED_EXT="3gp"
                  ;;
                *video/ogg*)
                  SELECTED_EXT="ogv"
                  ;;
                *application/vnd.apple.mpegurl*|*application/x-mpegurl*)
                  SELECTED_EXT="m3u8"
                  ;;
                *audio/mpeg*)
                  SELECTED_EXT="mp3"
                  ;;
                *audio/aac*)
                  SELECTED_EXT="aac"
                  ;;
                *audio/x-aiff*|*audio/aiff*)
                  SELECTED_EXT="aiff"
                  ;;
                *audio/amr*)
                  SELECTED_EXT="amr"
                  ;;
                *audio/flac*)
                  SELECTED_EXT="flac"
                  ;;
                *audio/wav*|*audio/x-wav*)
                  SELECTED_EXT="wav"
                  ;;
                *audio/mp4*)
                  SELECTED_EXT="m4a"
                  ;;
                *audio/ogg*)
                  SELECTED_EXT="ogg"
                  ;;
                *audio/webm*)
                  SELECTED_EXT="weba"
                  ;;
                *audio/midi*|*audio/x-midi*)
                  SELECTED_EXT="mid"
                  ;;
                *image/jpeg*)
                  SELECTED_EXT="jpg"
                  ;;
                *image/png*)
                  SELECTED_EXT="png"
                  ;;
                *image/webp*)
                  SELECTED_EXT="webp"
                  ;;
                *image/gif*)
                  SELECTED_EXT="gif"
                  ;;
                *image/svg+xml*)
                  SELECTED_EXT="svg"
                  ;;
                *image/bmp*)
                  SELECTED_EXT="bmp"
                  ;;
                *image/tiff*)
                  SELECTED_EXT="tiff"
                  ;;
                *image/x-icon*|*image/vnd.microsoft.icon*)
                  SELECTED_EXT="ico"
                  ;;
                *image/heic*)
                  SELECTED_EXT="heic"
                  ;;
                *image/heif*)
                  SELECTED_EXT="heif"
                  ;;
                *image/avif*)
                  SELECTED_EXT="avif"
                  ;;
                *font/ttf*|*application/x-font-ttf*)
                  SELECTED_EXT="ttf"
                  ;;
                *font/otf*|*application/x-font-otf*)
                  SELECTED_EXT="otf"
                  ;;
                *font/woff*)
                  SELECTED_EXT="woff"
                  ;;
                *font/woff2*)
                  SELECTED_EXT="woff2"
                  ;;
                *application/x-rar*)
                  SELECTED_EXT="rar"
                  ;;
                *application/x-7z-compressed*)
                  SELECTED_EXT="7z"
                  ;;
                *application/vnd.debian.binary-package*|*application/x-debian-package*)
                  SELECTED_EXT="deb"
                  ;;
                *application/x-rpm*)
                  SELECTED_EXT="rpm"
                  ;;
                *application/vnd.snap*)
                  SELECTED_EXT="snap"
                  ;;
                *application/x-appimage*)
                  SELECTED_EXT="appimage"
                  ;;
                *application/x-msdownload*|*application/x-dosexec*)
                  SELECTED_EXT="exe"
                  ;;
                *application/x-msi*|*application/x-ole-storage*)
                  SELECTED_EXT="msi"
                  ;;
                *application/vnd.microsoft.portable-executable*)
                  SELECTED_EXT="exe"
                  ;;
                *application/x-ms-shortcut*)
                  SELECTED_EXT="lnk"
                  ;;
                *application/x-iso9660-image*)
                  SELECTED_EXT="iso"
                  ;;
                *application/x-apple-diskimage*)
                  SELECTED_EXT="dmg"
                  ;;
                *application/x-mach-binary*)
                  SELECTED_EXT="mach-o"
                  ;;
                *application/x-pkg*)
                  SELECTED_EXT="pkg"
                  ;;
                *application/vnd.apple.installer+xml*)
                  SELECTED_EXT="pkg"
                  ;;
                *application/x-itunes-ipa*)
                  SELECTED_EXT="ipa"
                  ;;
                *application/x-apple-aspen-config*)
                  SELECTED_EXT="mobileconfig"
                  ;;
                *application/java-archive*)
                  SELECTED_EXT="jar"
                  ;;
                *application/x-java-archive-diff*)
                  SELECTED_EXT="jardiff"
                  ;;
                *application/wasm*)
                  SELECTED_EXT="wasm"
                  ;;
                *application/x-sharedlib*)
                  SELECTED_EXT="so"
                  ;;
                *application/x-object*)
                  SELECTED_EXT="o"
                  ;;
                *application/x-python-code*)
                  SELECTED_EXT="pyc"
                  ;;
                *application/vnd.docker.image.rootfs.diff.tar.gzip*)
                  SELECTED_EXT="docker.tar.gz"
                  ;;
                *application/x-elf*)
                  SELECTED_EXT="elf"
                  ;;
                *)
                  SELECTED_EXT="bin"
                  ;;
              esac
            fi
          }

          is_ytdlp_supported() {
            yt-dlp --no-check-certificates --simulate --no-playlist --cookies "cookies.txt" "$URL" >/dev/null 2>&1
          }

          download_ytdlp() {
            echo "Using yt-dlp for supported URL"

            yt-dlp \
              -f "bv*+ba/b" \
              --no-check-certificates \
              --merge-output-format mp4 \
              --no-playlist \
              --cookies "cookies.txt" \
              -o "temp_download.%(ext)s" \
              "$URL"

            DOWNLOADED_FILE=$(find . -maxdepth 1 -name "temp_download.*" | head -n 1)

            if [ -z "$DOWNLOADED_FILE" ]; then
              echo "yt-dlp failed to produce a file"
              exit 1
            fi

            RAW_NAME=$(basename "$DOWNLOADED_FILE")
            NAME_NO_EXT="${RAW_NAME%.*}"
            SELECTED_EXT="${RAW_NAME##*.}"

            mv "$DOWNLOADED_FILE" temp_download
          }

          if is_ytdlp_supported; then
            download_ytdlp
          else
            echo "URL is not supported by yt-dlp; using direct download"
            download_direct
          fi

          if [ "$SAFE_MODE" == "true" ]; then
            FINAL_FILE="$FOLDER.$SELECTED_EXT"
          else
            if [ -n "$NAME_NO_EXT" ] && [ "$NAME_NO_EXT" != "$RAW_NAME" ] && [ "$NAME_NO_EXT" != "temp_download" ]; then
              FINAL_FILE="$NAME_NO_EXT.$SELECTED_EXT"
            else
              FINAL_FILE="$FOLDER.$SELECTED_EXT"
            fi
          fi

          mkdir -p wrap_dir
          mv "temp_download" "wrap_dir/$FINAL_FILE"

          cd wrap_dir
          zip -0 "../$FOLDER.zip" "$FINAL_FILE"
          cd ..

          mkdir -p "downloads/$FOLDER"

          split -b 90M -d -a 3 "$FOLDER.zip" "downloads/$FOLDER/chunk_"

          a=1
          for i in downloads/$FOLDER/chunk_*; do
            new=$(printf "downloads/$FOLDER/$FOLDER.zip.%03d" "$a")
            mv -- "$i" "$new"
            let a=a+1
          done

          git config user.name "OctoFetchBot"
          git config user.email "bot@octofetch.local"

          git pull origin main || true

          for file in downloads/$FOLDER/*; do
            if [ -f "$file" ]; then
              BASENAME=$(basename "$file")

              git add "$file"

              git commit -m "Add $BASENAME" || {
                echo "No changes for $BASENAME"
                continue
              }

              git push
            fi
          done

          rm -f cookies.txt